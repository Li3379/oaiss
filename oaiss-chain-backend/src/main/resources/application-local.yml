# application-local.yml
# 本地开发配置 - 连接Docker基础设施（MySQL 3307, Redis 6379）
# 激活方式: spring.profiles.active=local

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/oaiss_chain?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}

jwt:
  secret: ${JWT_SECRET:}

# 日志级别调整
logging:
  level:
    com.oaiss.chain: DEBUG
    org.springframework.web: DEBUG
