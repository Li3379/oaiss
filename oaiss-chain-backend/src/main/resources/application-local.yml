# application-local.yml
# 本地开发配置 - 连接本地MySQL（如果开发者不想用Docker）
# 激活方式: spring.profiles.active=local

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/oaiss_chain?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9002}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

# 日志级别调整
logging:
  level:
    com.oaiss.chain: DEBUG
    org.springframework.web: DEBUG
