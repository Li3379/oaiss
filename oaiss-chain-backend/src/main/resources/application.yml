server:
  port: 8080
  servlet:
    context-path: /api/v1
  # Graceful Shutdown Configuration
  shutdown: graceful
  lifecycle:
    timeout-per-shutdown-phase: 30s

spring:
  application:
    name: oaiss-chain-backend
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/oaiss_chain?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: OaissChainPool
      max-lifetime: 1800000
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: flyway_schema_history

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000  # 1 hour in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

# Logging Configuration
logging:
  level:
    root: INFO
    com.oaiss.chain: INFO
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9002}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET:oaiss-chain}
  presigned-url-expiry: 3600
  max-file-size: 104857600  # 100MB

# Actuator & Prometheus Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
    prometheus:
      enabled: true
    env:
      show-values: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    db:
      enabled: true
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5,0.95,0.99
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5,0.95,0.99

# App-specific Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174}

# API Documentation
springdoc:
  api-docs:
    path: /v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

# ML Service Configuration
ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8001}
    connect-timeout: 5s
    read-timeout: 30s

# Resilience4j Circuit Breaker for ML service
resilience4j:
  circuitbreaker:
    configs:
      default:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 5s
        wait-duration-in-open-state: 30s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      mlService:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 35s

# Hyperledger Fabric configuration
fabric:
  enabled: false
  msp-id: Org1MSP
  channel-name: mychannel
  chaincode-name: carbon-chaincode
  peer-endpoint: peer0.org1.example.com:7051
  tls-enabled: true
  peer-tls-cert-path: classpath:fabric/crypto/peer-tls-ca.crt
  cert-path: classpath:fabric/crypto/user-cert.pem
  key-path: classpath:fabric/crypto/user-key.pem
  connect-timeout: 30
  submit-timeout: 60
  ca:
    enabled: false
    endpoint: http://ca.org1.example.com:7054
    admin-name: admin
    admin-password: ${FABRIC_CA_ADMIN_PASSWORD:}
