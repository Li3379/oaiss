# Grafana Dashboard Provisioning Configuration
apiVersion: 1

providers:
  - name: 'OAISS Chain Dashboards'
    orgId: 1
    folder: 'OAISS Chain'
    folderUid: 'oaiss-chain'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
