# =============================================
# Logstash Pipeline Configuration
# OAISS Chain Log Processing Pipeline
# Author: OAISS Team
# =============================================

input {
  # TCP input for application logs
  tcp {
    port => 5000
    codec => json_lines
    tags => ["application", "spring-boot"]
  }
  
  # Beats input for file-based logs
  beats {
    port => 5044
    tags => ["filebeat"]
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed_log"
    }
  }
  
  # Extract timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
    timezone => "Asia/Shanghai"
  }
  
  # Add service metadata
  mutate {
    add_field => {
      "service" => "oaiss-chain-backend"
      "environment" => "production"
    }
  }
  
  # Parse log level
  if [parsed_log][level] {
    mutate {
      rename => { "[parsed_log][level]" => "log_level" }
    }
  }
  
  # Parse logger name
  if [parsed_log][logger_name] {
    mutate {
      rename => { "[parsed_log][logger_name]" => "logger" }
    }
  }
  
  # Parse thread name
  if [parsed_log][thread_name] {
    mutate {
      rename => { "[parsed_log][thread_name]" => "thread" }
    }
  }
  
  # Parse MDC fields (enterprise_id, user_id, etc.)
  if [parsed_log][mdc] {
    ruby {
      code => '
        mdc = event.get("[parsed_log][mdc]")
        if mdc
          mdc.each do |key, value|
            event.set("mdc_#{key}", value)
          end
        end
      '
    }
  }
  
  # Remove original message if parsed
  if [parsed_log] {
    mutate {
      remove_field => ["message"]
    }
  }
  
  # Add geo-location for IP addresses (optional)
  if [parsed_log][client_ip] {
    geoip {
      source => "[parsed_log][client_ip]"
      target => "geoip"
    }
  }
}

output {
  # Elasticsearch output
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "oaiss-chain-%{+YYYY.MM.dd}"
    template_name => "oaiss-chain"
    template_overwrite => true
  }
  
  # Debug output (disabled by default)
  # stdout {
  #   codec => rubydebug
  # }
}