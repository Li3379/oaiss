# OAISS Chain Backend Prometheus Alerting Rules
# For use with Prometheus AlertManager

groups:
  - name: oaiss-chain-backend-alerts
    rules:
      # Application Health Alerts
      - alert: ApplicationDown
        expr: up{job="oaiss-chain-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OAISS Chain Backend is down"
          description: "The OAISS Chain Backend application has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{application="oaiss-chain-backend", status=~"5.."}[5m])) 
          / 
          sum(rate(http_server_requests_seconds_count{application="oaiss-chain-backend"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes."

      # Memory Alerts
      - alert: HighMemoryUsage
        expr: |
          jvm_memory_used_bytes{application="oaiss-chain-backend", area="heap"} 
          / 
          jvm_memory_max_bytes{application="oaiss-chain-backend", area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap memory usage"
          description: "JVM heap memory usage is above 85% for more than 5 minutes."

      - alert: CriticalMemoryUsage
        expr: |
          jvm_memory_used_bytes{application="oaiss-chain-backend", area="heap"} 
          / 
          jvm_memory_max_bytes{application="oaiss-chain-backend", area="heap"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical JVM heap memory usage"
          description: "JVM heap memory usage is above 95% for more than 2 minutes."

      # Response Time Alerts
      - alert: HighResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application="oaiss-chain-backend"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is above 2 seconds for more than 5 minutes."

      - alert: CriticalResponseTime
        expr: |
          histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{application="oaiss-chain-backend"}[5m])) by (le)) > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical response time detected"
          description: "95th percentile response time is above 5 seconds for more than 2 minutes."

      # Database Connection Pool Alerts
      - alert: DatabaseConnectionPoolNearLimit
        expr: |
          hikaricp_connections_active{application="oaiss-chain-backend"} 
          / 
          hikaricp_connections_max{application="oaiss-chain-backend"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool near limit"
          description: "More than 80% of database connections are in use."

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          hikaricp_connections_active{application="oaiss-chain-backend"} 
          / 
          hikaricp_connections_max{application="oaiss-chain-backend"} > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool almost exhausted"
          description: "More than 95% of database connections are in use."

      # Business Metrics Alerts
      - alert: HighPendingCarbonCredits
        expr: oaiss_carbon_pending > 100
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High number of pending carbon credits"
          description: "There are more than 100 pending carbon credits awaiting review."

      - alert: HighPendingTrades
        expr: oaiss_trade_pending > 50
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "High number of pending trades"
          description: "There are more than 50 pending trades awaiting review."

      # GC Alerts
      - alert: FrequentGC
        expr: |
          rate(jvm_gc_pause_seconds_count{application="oaiss-chain-backend"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frequent garbage collection detected"
          description: "Garbage collection is happening more than 5 times per second."

      # Error Count Alerts
      - alert: ApplicationErrors
        expr: rate(oaiss_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Application errors detected"
          description: "Application is logging errors at a rate of more than 0.1 per second."
