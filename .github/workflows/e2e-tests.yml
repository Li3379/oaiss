name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'oaiss-chain-backend/**'
      - 'oaiss-chain-frontend/**'
      - '.github/workflows/e2e-tests.yml'
  pull_request:
    paths:
      - 'oaiss-chain-backend/**'
      - 'oaiss-chain-frontend/**'
      - '.github/workflows/e2e-tests.yml'
  workflow_dispatch:

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: oaiss_chain
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      minio:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        env:
          MINIO_ROOT_USER: minio-test-access
          MINIO_ROOT_PASSWORD: minio-test-secret-key
        ports:
          - 9000:9000
        options: >-
          --health-cmd="wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: e2e-test-jwt-secret-key-minimum-32-characters
      SPRING_PROFILES_ACTIVE: docker
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minio-test-access
      MINIO_SECRET_KEY: minio-test-secret-key
      API_BASE_URL: http://localhost:8080/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: oaiss-chain-frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: |
          cd oaiss-chain-frontend
          npm ci

      - name: Build backend
        run: |
          cd oaiss-chain-backend
          mvn clean package -DskipTests -B

      - name: Run backend
        run: |
          cd oaiss-chain-backend
          java -jar target/*.jar &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for backend
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8080/api/v1/actuator/health > /dev/null 2>&1; do sleep 3; done'
          echo "Backend is healthy"

      - name: Install Playwright
        run: |
          cd oaiss-chain-frontend
          npx playwright install --with-deps chromium

      - name: Run E2E tests (smoke)
        run: |
          cd oaiss-chain-frontend
          npm run test:e2e

      - name: Start frontend dev server
        run: |
          cd oaiss-chain-frontend
          npx vite --port 5173 &

      - name: Run E2E tests (v1.1)
        if: success() || failure()
        run: |
          cd oaiss-chain-frontend
          TEST_MODE=v1.1 npx playwright test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: oaiss-chain-frontend/playwright-report/
          retention-days: 7

      - name: Stop backend
        if: always()
        run: |
          kill $BACKEND_PID 2>/dev/null || true
